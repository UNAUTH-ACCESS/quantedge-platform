services:
  postgres:
    image: postgres:16-alpine
    container_name: quantedge_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quantedge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quantedge_secret}
      POSTGRES_DB: ${POSTGRES_DB:-quantedge}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quantedge}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: api
    container_name: quantedge_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-quantedge}:${POSTGRES_PASSWORD:-quantedge_secret}@postgres:5432/${POSTGRES_DB:-quantedge}?connection_limit=10&pool_timeout=20
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      PORT: 3000
      CORS_ORIGIN: https://${DOMAIN}
      DELEGATE_SERVER_URL: http://172.19.0.1:3001
      DELEGATE_SHARED_SECRET: ${DELEGATE_SHARED_SECRET}
      SOLANA_DELEGATE_ADDRESS: ${SOLANA_DELEGATE_ADDRESS}
      DELEGATE_ADDRESS: ${DELEGATE_ADDRESS}
      TRON_DELEGATE_ADDRESS: ${TRON_DELEGATE_ADDRESS}
    networks:
      - internal

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: worker
    container_name: quantedge_worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-quantedge}:${POSTGRES_PASSWORD:-quantedge_secret}@postgres:5432/${POSTGRES_DB:-quantedge}?connection_limit=10&pool_timeout=20
      DELEGATE_SERVER_URL: http://172.19.0.1:3001
      DELEGATE_SHARED_SECRET: ${DELEGATE_SHARED_SECRET}
      SIGNAL_INTERVAL_MS: ${SIGNAL_INTERVAL_MS:-60000}
      MARKET_FEED_INTERVAL_MS: ${MARKET_FEED_INTERVAL_MS:-30000}
      SNAPSHOT_INTERVAL_MS: ${SNAPSHOT_INTERVAL_MS:-300000}
      DEPOSIT_INTERVAL_MS: ${DEPOSIT_INTERVAL_MS:-60000}
      MIN_DEPOSIT_USDC: ${MIN_DEPOSIT_USDC:-1}
      SOLANA_DEPOSIT_VAULT: ${SOLANA_DEPOSIT_VAULT}
      SOLANA_DELEGATE_ADDRESS: ${SOLANA_DELEGATE_ADDRESS}
      DELEGATE_ADDRESS: ${DELEGATE_ADDRESS}
      TRON_DELEGATE_ADDRESS: ${TRON_DELEGATE_ADDRESS}
    networks:
      - internal


  delegate:
    image: node:20-alpine
    container_name: quantedge_delegate
    restart: unless-stopped
    working_dir: /app
    volumes:
      - /home/solana/quantedge-delegate:/app
    command: node server/delegate-server.js
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      DELEGATE_SERVER_PORT: 3001
    env_file:
      - /home/solana/quantedge-delegate/.env
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quantedge_frontend
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: quantedge_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/active.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
    depends_on:
      - api
    networks:
      - internal

  certbot:
    image: certbot/certbot:latest
    container_name: quantedge_certbot
    volumes:
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
