server {
    listen 80;
    server_name quantedge.exchange www.quantedge.exchange;

    # ACME challenge only
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy API
    location /api/ {
        proxy_pass http://api:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Temporary root — return 200 so nginx starts cleanly
    location / {
        return 200 'QuantEdge bootstrapping...';
        add_header Content-Type text/plain;
    }
}
